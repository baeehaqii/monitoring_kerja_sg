name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server Kantor (task.siproper.com)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          envs: GH_TOKEN
          script: |
            set -e

            PROJECT_DIR="/www/wwwroot/monitoring_kerja_sg"
            cd $PROJECT_DIR

            echo "==> Pulling latest code..."
            git config --global --add safe.directory $PROJECT_DIR
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/baeehaqii/monitoring_kerja_sg.git
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm install --frozen-lockfile

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Running database migrations..."
            npx prisma migrate deploy

            echo "==> Building Next.js app..."
            npm run build

            echo "==> Restarting app..."
            NODE_MANAGER="/www/server/panel/plugin/nodejs_manager/node_manager.js"
            if [ -f "$NODE_MANAGER" ]; then
              node $NODE_MANAGER stop monitoring_kerja_sg 2>/dev/null || true
              sleep 2
              node $NODE_MANAGER start monitoring_kerja_sg
            else
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 2
              nohup npm start > /www/wwwlogs/nodejs/monitoring_kerja_sg.log 2>&1 &
            fi

            echo "==> Deploy complete!"
