name: Deploy to aaPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GH_TOKEN
          script: |
            set -e

            PROJECT_DIR="/www/wwwroot/task-sg.findy.my.id"
            cd $PROJECT_DIR

            echo "==> Fixing permissions..."
            sudo chown -R $(whoami):$(whoami) $PROJECT_DIR

            echo "==> Pulling latest code..."
            git config --global --add safe.directory $PROJECT_DIR
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/baeehaqii/monitoring_kerja_sg.git
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm install --frozen-lockfile

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Running database migrations..."
            npx prisma migrate deploy

            echo "==> Building Next.js app..."
            npm run build

            echo "==> Restarting app (aaPanel PM2)..."
            # Kill proses lain yang mungkin masih pakai port 3003
            sudo fuser -k 3003/tcp 2>/dev/null || true

            # Reload graceful via PM2
            if pm2 list | grep -q "task-sg"; then
              pm2 reload task-sg --update-env
            elif pm2 list | grep -q "tasksg"; then
              pm2 reload tasksg --update-env
            else
              pm2 start ecosystem.config.js
            fi

            echo "==> Deploy complete!"
